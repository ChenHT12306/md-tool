name: Build macOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails build

      - name: Register .md file association
        run: |
          PLIST="build/bin/mdtool.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleDocumentTypes array' "$PLIST"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleDocumentTypes:0 dict' "$PLIST"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleDocumentTypes:0:CFBundleTypeExtensions array' "$PLIST"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleDocumentTypes:0:CFBundleTypeExtensions:0 string md' "$PLIST"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleDocumentTypes:0:CFBundleTypeName string MD Tool Document' "$PLIST"
          /usr/libexec/PlistBuddy -c 'Add :CFBundleDocumentTypes:0:CFBundleTypeRole string Editor' "$PLIST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdtool-macos
          path: build/bin/mdtool.app
