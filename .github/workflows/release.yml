name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        shell: bash

      - name: Build
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/mdtool.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build

      - name: Create DMG
        run: |
          APP=$(find build -maxdepth 3 -name '*.app' | head -n1)
          echo "Found app: $APP"
          if [ -z "$APP" ]; then
            echo "mdtool.app not found, build output:"
            ls -R build | head -50
            exit 1
          fi
          hdiutil create -volname MDTool -srcfolder "$APP" -ov -format UDZO mdtool.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: mdtool.dmg

  release:
    name: Publish Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows/mdtool.exe
            artifacts/macos/mdtool.dmg
